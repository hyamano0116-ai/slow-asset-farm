<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>観察記録 | 農的ストックDB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__logo">&#x1F33F; 農的ストックDB</a>
  <div class="nav__links">
    <a href="index.html" class="nav__link">ホーム</a>
    <a href="hypotheses.html" class="nav__link">仮説一覧</a>
    <a href="observations.html" class="nav__link nav__link--active">観察記録</a>
  </div>
</nav>

<div class="container page">
  <div class="page-header">
    <div>
      <h1>観察記録</h1>
      <p class="page-subtitle">フィールドで気づいたことをその場で記録する</p>
    </div>
    <button class="btn btn--primary" id="btnAdd">＋ 新規記録</button>
  </div>

  <div class="filter-bar">
    <select id="filterHyp" class="form-control" style="width:auto">
      <option value="">全仮説</option>
    </select>
    <input type="month" id="filterMonth" class="form-control" style="width:auto">
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div style="display:flex;flex-direction:column;gap:0.75rem" id="list"></div>
</div>

<!-- 新規記録モーダル -->
<div class="modal-overlay" id="modalOverlay" hidden>
  <div class="modal">
    <div class="modal__header">
      <h2>観察記録を追加</h2>
      <button class="modal__close" id="btnClose">&times;</button>
    </div>
    <div class="modal__body">
      <form id="obsForm">
        <div class="form-group">
          <label class="form-label">関連仮説</label>
          <select name="hypothesisId" id="hypSelect" class="form-control">
            <option value="">なし</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
          <div class="form-group">
            <label class="form-label">日付 *</label>
            <input type="date" name="date" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">場所</label>
            <input type="text" name="location" class="form-control" placeholder="例: 北斜面・標高920m">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">タイトル *</label>
          <input type="text" name="title" class="form-control" required placeholder="例: 珠芽の発根確認">
        </div>
        <div class="form-group">
          <label class="form-label">内容</label>
          <textarea name="content" class="form-control" rows="4" placeholder="観察したこと、測定値、気づきなどを記録"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">タグ（カンマ区切り）</label>
          <input type="text" name="tags" class="form-control" placeholder="例: 珠芽, 発根確認">
        </div>
      </form>
    </div>
    <div class="modal__footer">
      <button class="btn btn--ghost" id="btnCancel">キャンセル</button>
      <button class="btn btn--primary" id="btnSave">保存する</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
var KEYS = { H:'saf_hypotheses', O:'saf_observations', INIT:'saf_initialized' };
function getH() { return JSON.parse(localStorage.getItem(KEYS.H)||'[]'); }
function getO() { return JSON.parse(localStorage.getItem(KEYS.O)||'[]'); }
function saveO(d) { localStorage.setItem(KEYS.O, JSON.stringify(d)); }
if (!localStorage.getItem(KEYS.INIT)) {
  localStorage.setItem(KEYS.H, JSON.stringify(SAF_DATA.hypotheses));
  localStorage.setItem(KEYS.O, JSON.stringify(SAF_DATA.observations));
  localStorage.setItem(KEYS.INIT,'1');
}

function genId() { return 'o'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function buildFilterOptions() {
  var hs = getH();
  var sel = document.getElementById('filterHyp');
  sel.innerHTML = '<option value="">全仮説</option>'
    +hs.map(function(h){return '<option value="'+h.id+'">'+h.title+'</option>';}).join('');
}

function buildHypOptions() {
  var hs = getH();
  document.getElementById('hypSelect').innerHTML = '<option value="">なし</option>'
    +hs.map(function(h){return '<option value="'+h.id+'">'+h.title+'</option>';}).join('');
}

function render() {
  var hypId = document.getElementById('filterHyp').value;
  var month = document.getElementById('filterMonth').value;
  var hs = getH();
  var os = getO().sort(function(a,b){return b.date.localeCompare(a.date);});
  if (hypId) os = os.filter(function(o){return o.hypothesisId===hypId;});
  if (month) os = os.filter(function(o){return o.date&&o.date.startsWith(month);});
  document.getElementById('filterCount').textContent = os.length+'件';
  document.getElementById('list').innerHTML = os.length
    ? os.map(function(o) {
        var h = hs.find(function(x){return x.id===o.hypothesisId;});
        return '<div class="obs-card">'
          +'<div class="obs-card__date-loc"><span>'+(o.date||'')+'</span><span>&middot;</span><span>'+(o.location||'')+'</span></div>'
          +'<div class="obs-card__title">'+o.title+'</div>'
          +'<div class="obs-card__content">'+(o.content||'')+'</div>'
          +(h?'<a href="hypothesis-detail.html?id='+h.id+'" class="obs-card__hyp-link">&rarr; '+h.title+'</a>':'')
          +'<div class="badges mt-1">'+(o.tags||[]).map(function(t){return '<span class="badge badge--tag">'+t+'</span>';}).join('')+'</div>'
          +'</div>';
      }).join('')
    : '<div class="empty">観察記録がありません。「＋ 新規記録」から追加できます。</div>';
}

function openModal() {
  buildHypOptions();
  document.getElementById('obsForm').reset();
  document.querySelector('[name="date"]').valueAsDate = new Date();
  document.getElementById('modalOverlay').removeAttribute('hidden');
}
function closeModal() {
  document.getElementById('modalOverlay').setAttribute('hidden','');
}

document.getElementById('btnAdd').addEventListener('click', openModal);
document.getElementById('btnClose').addEventListener('click', closeModal);
document.getElementById('btnCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e){
  if (e.target===e.currentTarget) closeModal();
});

document.getElementById('btnSave').addEventListener('click', function(){
  var form = document.getElementById('obsForm');
  if (!form.reportValidity()) return;
  var fd = new FormData(form);
  var ob = {
    id: genId(),
    hypothesisId: fd.get('hypothesisId')||null,
    date: fd.get('date'),
    location: fd.get('location'),
    title: fd.get('title'),
    content: fd.get('content'),
    tags: fd.get('tags').split(',').map(function(t){return t.trim();}).filter(Boolean),
    createdAt: new Date().toISOString()
  };
  var all = getO();
  all.unshift(ob);
  saveO(all);
  closeModal();
  render();
});

['filterHyp','filterMonth'].forEach(function(id){
  document.getElementById(id).addEventListener('change', render);
});
buildFilterOptions();
render();
</script>
</body>
</html>
