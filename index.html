<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農的ストックビジネス仮説DB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <span class="nav__logo">&#x1F33F; 農的ストックDB</span>
  <div class="nav__links">
    <a href="index.html" class="nav__link nav__link--active">ホーム</a>
    <a href="hypotheses.html" class="nav__link">仮説一覧</a>
    <a href="observations.html" class="nav__link">観察記録</a>
  </div>
</nav>

<div class="hero">
  <p class="hero__eyebrow">山梨高冷地 フィールドジャーナル</p>
  <h1 class="hero__title">田舎 &times; 時間 &times; 農業の再編集<br>= ストック資産</h1>
  <p class="hero__sub">待つこと、観察すること、比較すること、記録すること。そのすべてが、商品になり、体験になり、教育になり、毎年積み上がる。</p>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="container page">

  <div class="section">
    <div class="section__header">
      <span class="section__title">注目の仮説 TOP3</span>
      <a href="hypotheses.html" class="section__link">すべて見る &rarr;</a>
    </div>
    <div class="grid-3" id="top3"></div>
  </div>

  <div class="section">
    <div class="section__header">
      <span class="section__title">カテゴリ別マップ</span>
    </div>
    <div class="cat-map" id="catMap"></div>
  </div>

  <div class="section">
    <div class="section__header">
      <span class="section__title">最新の観察記録</span>
      <a href="observations.html" class="section__link">すべて見る &rarr;</a>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.75rem" id="recentObs"></div>
  </div>

</div>

<script src="data.js"></script>
<script>
var KEYS = { H:'saf_hypotheses', O:'saf_observations', INIT:'saf_initialized' };
function getH() { return JSON.parse(localStorage.getItem(KEYS.H)||'[]'); }
function getO() { return JSON.parse(localStorage.getItem(KEYS.O)||'[]'); }
if (!localStorage.getItem(KEYS.INIT)) {
  localStorage.setItem(KEYS.H, JSON.stringify(SAF_DATA.hypotheses));
  localStorage.setItem(KEYS.O, JSON.stringify(SAF_DATA.observations));
  localStorage.setItem(KEYS.INIT,'1');
}

function totalScore(h) { return Object.values(h.scores).reduce(function(s,v){return s+v;},0); }

var CAT_ICON = {'希少植物・生薬作物':'&#x1F33F;','土づくり':'&#x1F31E;','家庭菜園':'&#x1F966;'};
var STATUS_CLS = {'検証前':'badge--pre','検証中':'badge--verif','支持':'badge--sup','棄却':'badge--rej','継続観察':'badge--cont'};
function badge(s) { return '<span class="badge '+(STATUS_CLS[s]||'badge--pre')+'">'+ s +'</span>'; }

function stat(n, label) {
  return '<div class="stat-item"><span class="stat-item__number">'+n+'</span><span class="stat-item__label">'+label+'</span></div>';
}

var TOP_SCORES = [
  ['時間価値','timeValue','v'],
  ['希少性','rarity','v'],
  ['ストック性','stockability','b']
];
function miniBar(label, val, t) {
  return '<div class="mini-score">'
    +'<span class="mini-score__label">'+label+'</span>'
    +'<div class="mini-score__bar"><div class="mini-score__fill fill--'+t+'" style="width:'+(val/5*100)+'%"></div></div>'
    +'<span class="mini-score__val">'+val+'</span></div>';
}

function renderStats() {
  var hs=getH(), os=getO();
  document.getElementById('statsBar').innerHTML =
    stat(hs.length,'仮説数')+stat(os.length,'観察数')+
    stat(hs.filter(function(h){return h.status==='検証中';}).length,'検証中')+
    stat(hs.filter(function(h){return h.scores.priority>=4;}).length,'高優先');
}

function renderTop3() {
  var hs=getH();
  var top3=[].concat(hs).sort(function(a,b){return totalScore(b)-totalScore(a);}).slice(0,3);
  document.getElementById('top3').innerHTML = top3.map(function(h) {
    var ts=totalScore(h), icon=CAT_ICON[h.category]||'&#x1F331;';
    return '<a href="hypothesis-detail.html?id='+h.id+'" class="card card--link">'
      +'<div class="card__img">'+icon+'</div>'
      +'<div class="card__body">'
      +'<div class="card__meta">'+badge(h.status)+'<span class="badge badge--cat">'+h.category+'</span></div>'
      +'<div class="card__title">'+h.title+'</div>'
      +'<div class="mini-scores" style="margin-top:0.5rem">'
      +TOP_SCORES.map(function(x){return miniBar(x[0],h.scores[x[1]],x[2]);}).join('')
      +'</div></div>'
      +'<div class="card__footer">'
      +'<div class="badges">'+h.monetizationPaths.slice(0,2).map(function(p){return '<span class="badge badge--path">'+p+'</span>';}).join('')+'</div>'
      +'<span style="font-size:0.8rem;font-weight:700;color:var(--accent)">'+ts+'<span style="opacity:0.5;font-weight:400">/70</span></span>'
      +'</div></a>';
  }).join('');
}

function renderCatMap() {
  var hs=getH(), cats={};
  hs.forEach(function(h){ cats[h.category]=(cats[h.category]||0)+1; });
  var max=Math.max.apply(null,Object.values(cats).concat([1]));
  document.getElementById('catMap').innerHTML = Object.entries(cats).map(function(e) {
    return '<div class="cat-map__item">'
      +'<span style="font-size:1.4rem">'+(CAT_ICON[e[0]]||'&#x1F331;')+'</span>'
      +'<span class="cat-map__name">'+e[0]+'</span>'
      +'<div class="cat-map__bar"><div class="cat-map__fill" style="width:'+(e[1]/max*100).toFixed(0)+'%"></div></div>'
      +'<span class="cat-map__count">'+e[1]+'件</span></div>';
  }).join('');
}

function renderRecentObs() {
  var os=getO(), hs=getH();
  var recent=[].concat(os).sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,3);
  document.getElementById('recentObs').innerHTML = recent.length
    ? recent.map(function(o) {
        var h=hs.find(function(x){return x.id===o.hypothesisId;});
        return '<div class="obs-card">'
          +'<div class="obs-card__date-loc"><span>'+o.date+'</span><span>&middot;</span><span>'+o.location+'</span></div>'
          +'<div class="obs-card__title">'+o.title+'</div>'
          +'<div class="obs-card__content">'+o.content+'</div>'
          +(h?'<a href="hypothesis-detail.html?id='+h.id+'" class="obs-card__hyp-link">&rarr; '+h.title+'</a>':'')
          +'<div class="badges mt-1">'+o.tags.map(function(t){return '<span class="badge badge--tag">'+t+'</span>';}).join('')+'</div>'
          +'</div>';
      }).join('')
    : '<div class="empty">観察記録がありません</div>';
}

renderStats(); renderTop3(); renderCatMap(); renderRecentObs();
</script>
</body>
</html>
