<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仮説詳細 | 農的ストックDB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__logo">&#x1F33F; 農的ストックDB</a>
  <div class="nav__links">
    <a href="index.html" class="nav__link">ホーム</a>
    <a href="hypotheses.html" class="nav__link nav__link--active">仮説一覧</a>
    <a href="observations.html" class="nav__link">観察記録</a>
  </div>
</nav>

<div id="root"></div>

<script src="data.js"></script>
<script>
var KEYS = { H:'saf_hypotheses', O:'saf_observations', INIT:'saf_initialized' };
function getH() { return JSON.parse(localStorage.getItem(KEYS.H)||'[]'); }
function getO() { return JSON.parse(localStorage.getItem(KEYS.O)||'[]'); }
if (!localStorage.getItem(KEYS.INIT)) {
  localStorage.setItem(KEYS.H, JSON.stringify(SAF_DATA.hypotheses));
  localStorage.setItem(KEYS.O, JSON.stringify(SAF_DATA.observations));
  localStorage.setItem(KEYS.INIT,'1');
}

var id = new URLSearchParams(location.search).get('id');
var h = getH().find(function(x){return x.id===id;});

if (!h) {
  document.getElementById('root').innerHTML =
    '<div class="container"><div class="empty" style="padding-top:3rem">'
    +'仮説が見つかりません <a href="hypotheses.html">戻る</a></div></div>';
} else {
  document.title = h.title + ' | 農的ストックDB';

  function totalScore(h) { return Object.values(h.scores).reduce(function(s,v){return s+v;},0); }

  var STATUS_CLS = {'検証前':'badge--pre','検証中':'badge--verif','支持':'badge--sup','棄却':'badge--rej','継続観察':'badge--cont'};
  var CAT_ICON = {'希少植物・生薬作物':'&#x1F33F;','土づくり':'&#x1F31E;','家庭菜園':'&#x1F966;'};

  // 14項目スコアグループ定義
  var GROUPS = [
    {
      key:'v',
      title:'価値スコア（6項目 / 満点30点）',
      items:[['時間価値','timeValue'],['田舎価値','ruralValue'],['教育価値','educationalValue'],['希少性','rarity'],['ストーリー性','storyPotential'],['再現性','reproducibility']]
    },
    {
      key:'b',
      title:'ビジネスポテンシャル（5項目 / 満点25点）',
      items:[['ストック性','stockability'],['コンテンツ化しやすさ','contentEase'],['商品化しやすさ','productEase'],['体験化しやすさ','experienceEase'],['コミュニティ化しやすさ','communityEase']]
    },
    {
      key:'e',
      title:'実行指標（3項目 / 満点15点）',
      items:[['初期コスト（5=低）','initialCost'],['手間（5=低）','effort'],['優先度','priority']]
    }
  ];

  function scoreBar(label, val, type) {
    return '<div class="score-item">'
      +'<span class="score-item__label">'+label+'</span>'
      +'<div class="score-item__bar"><div class="score-item__fill fill--'+type+'" style="width:'+(val/5*100)+'%"></div></div>'
      +'<span class="score-item__val">'+val+'</span>'
      +'</div>';
  }

  var ts = totalScore(h);
  var obs = getO().filter(function(o){return o.hypothesisId===h.id;});
  var icon = CAT_ICON[h.category]||'&#x1F331;';
  var statusCls = STATUS_CLS[h.status]||'badge--pre';

  var html =
    // ---- 詳細ヘッダー ----
    '<div class="detail-header">'
    +'<div class="container">'
    +'<a href="hypotheses.html" class="back-link">&larr; 仮説一覧に戻る</a>'
    +'<div class="detail-header__meta">'
    +'<span class="badge '+statusCls+'">'+h.status+'</span>'
    +'<span class="badge badge--cat">'+h.category+'</span>'
    +(h.startDate?'<span style="font-size:0.75rem;opacity:0.6">開始: '+h.startDate+'</span>':'')
    +'</div>'
    +'<h1 class="detail-header__title">'+icon+' '+h.title+'</h1>'
    +'</div></div>'

    // ---- 本文グリッド ----
    +'<div class="container page">'
    +'<div class="grid-2" style="gap:2rem">'

    // 左カラム
    +'<div>'
    +'<div class="detail-section"><h3>概要・背景</h3><p>'+h.description+'</p></div>'
    +'<div class="detail-section"><h3>検証項目</h3>'
    +'<ul class="checklist">'
    +(h.verificationItems||[]).map(function(v){
        return '<li class="checklist__item"><span class="checklist__icon">□</span><span>'+v+'</span></li>';
      }).join('')
    +'</ul></div>'
    +'<div class="detail-section"><h3>収益化パス</h3>'
    +'<div class="badges">'
    +(h.monetizationPaths||[]).map(function(p){return '<span class="badge badge--path">'+p+'</span>';}).join('')
    +'</div></div>'
    +(h.notes?'<div class="detail-section"><h3>メモ・補足</h3><p>'+h.notes+'</p></div>':'')
    +'</div>'

    // 右カラム: 14項目スコア
    +'<div>'
    +'<div class="total-score-box">'
    +'<div class="total-score-box__label">14項目総合スコア</div>'
    +'<div class="total-score-box__value">'+ts+'<span class="total-score-box__max">/70</span></div>'
    +'</div>'
    +GROUPS.map(function(g){
        return '<div class="score-group">'
          +'<div class="score-group__title">'+g.title+'</div>'
          +g.items.map(function(item){return scoreBar(item[0],h.scores[item[1]],g.key);}).join('')
          +'</div>';
      }).join('')
    +'</div>'

    +'</div>' // grid-2

    // 関連観察記録
    +'<hr class="divider">'
    +'<div class="section">'
    +'<div class="section__header">'
    +'<span class="section__title">関連観察記録 ('+obs.length+'件)</span>'
    +'<a href="observations.html" class="section__link">観察記録へ &rarr;</a>'
    +'</div>'
    +(obs.length
      ? '<div style="display:flex;flex-direction:column;gap:0.75rem">'
        +obs.sort(function(a,b){return b.date.localeCompare(a.date);}).map(function(o){
            return '<div class="obs-card">'
              +'<div class="obs-card__date-loc"><span>'+o.date+'</span><span>&middot;</span><span>'+o.location+'</span></div>'
              +'<div class="obs-card__title">'+o.title+'</div>'
              +'<div class="obs-card__content">'+o.content+'</div>'
              +'<div class="badges mt-1">'+o.tags.map(function(t){return '<span class="badge badge--tag">'+t+'</span>';}).join('')+'</div>'
              +'</div>';
          }).join('')+'</div>'
      : '<div class="empty">観察記録がありません</div>')
    +'</div>'
    +'</div>'; // container

  document.getElementById('root').innerHTML = html;
}
</script>
</body>
</html>
