<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仮説一覧 | 農的ストックDB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__logo">&#x1F33F; 農的ストックDB</a>
  <div class="nav__links">
    <a href="index.html" class="nav__link">ホーム</a>
    <a href="hypotheses.html" class="nav__link nav__link--active">仮説一覧</a>
    <a href="observations.html" class="nav__link">観察記録</a>
  </div>
</nav>

<div class="container page">
  <div class="page-header">
    <div>
      <h1>仮説一覧</h1>
      <p class="page-subtitle">検証項目・スコア・収益化パスを管理する</p>
    </div>
  </div>

  <div class="filter-bar">
    <select id="filterCat" class="form-control" style="width:auto">
      <option value="">全カテゴリ</option>
      <option>希少植物・生薬作物</option>
      <option>土づくり</option>
      <option>家庭菜園</option>
    </select>
    <select id="filterStatus" class="form-control" style="width:auto">
      <option value="">全ステータス</option>
      <option>検証前</option>
      <option>検証中</option>
      <option>支持</option>
      <option>棄却</option>
      <option>継続観察</option>
    </select>
    <select id="sortBy" class="form-control" style="width:auto">
      <option value="score">総合スコア順</option>
      <option value="priority">優先度順</option>
      <option value="newest">新着順</option>
    </select>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="grid-3" id="grid"></div>
</div>

<script src="data.js"></script>
<script>
var KEYS = { H:'saf_hypotheses', O:'saf_observations', INIT:'saf_initialized' };
function getH() { return JSON.parse(localStorage.getItem(KEYS.H)||'[]'); }
function getO() { return JSON.parse(localStorage.getItem(KEYS.O)||'[]'); }
if (!localStorage.getItem(KEYS.INIT)) {
  localStorage.setItem(KEYS.H, JSON.stringify(SAF_DATA.hypotheses));
  localStorage.setItem(KEYS.O, JSON.stringify(SAF_DATA.observations));
  localStorage.setItem(KEYS.INIT,'1');
}

function totalScore(h) { return Object.values(h.scores).reduce(function(s,v){return s+v;},0); }

var CAT_ICON = {'希少植物・生薬作物':'&#x1F33F;','土づくり':'&#x1F31E;','家庭菜園':'&#x1F966;'};
var STATUS_CLS = {'検証前':'badge--pre','検証中':'badge--verif','支持':'badge--sup','棄却':'badge--rej','継続観察':'badge--cont'};
function badge(s) { return '<span class="badge '+(STATUS_CLS[s]||'badge--pre')+'">'+ s +'</span>'; }

var TOP_SCORES = [
  ['時間価値','timeValue','v'],
  ['希少性','rarity','v'],
  ['ストック性','stockability','b'],
  ['コンテンツ化','contentEase','b'],
  ['優先度','priority','e']
];

function miniBar(label, val, t) {
  return '<div class="mini-score">'
    +'<span class="mini-score__label">'+label+'</span>'
    +'<div class="mini-score__bar"><div class="mini-score__fill fill--'+t+'" style="width:'+(val/5*100)+'%"></div></div>'
    +'<span class="mini-score__val">'+val+'</span></div>';
}

function renderCard(h) {
  var icon = CAT_ICON[h.category]||'&#x1F331;';
  var ts = totalScore(h);
  var obsCount = getO().filter(function(o){return o.hypothesisId===h.id;}).length;
  return '<a href="hypothesis-detail.html?id='+h.id+'" class="card card--link">'
    +'<div class="card__img">'+icon+'</div>'
    +'<div class="card__body">'
    +'<div class="card__meta">'+badge(h.status)+'<span class="badge badge--cat">'+h.category+'</span></div>'
    +'<div class="card__title">'+h.title+'</div>'
    +'<div class="card__desc">'+(h.description||'')+'</div>'
    +'<div class="mini-scores">'+TOP_SCORES.map(function(x){return miniBar(x[0],h.scores[x[1]],x[2]);}).join('')+'</div>'
    +'</div>'
    +'<div class="card__footer">'
    +'<span style="font-size:0.75rem;color:var(--muted)">観察'+obsCount+'件</span>'
    +'<span style="font-size:0.85rem;font-weight:700;color:var(--accent)">'+ts+'<span style="opacity:0.5;font-weight:400">/70</span></span>'
    +'</div></a>';
}

function render() {
  var cat = document.getElementById('filterCat').value;
  var status = document.getElementById('filterStatus').value;
  var sort = document.getElementById('sortBy').value;
  var hs = getH();
  if (cat) hs = hs.filter(function(h){return h.category===cat;});
  if (status) hs = hs.filter(function(h){return h.status===status;});
  if (sort==='score') hs.sort(function(a,b){return totalScore(b)-totalScore(a);});
  else if (sort==='priority') hs.sort(function(a,b){return b.scores.priority-a.scores.priority;});
  else hs.sort(function(a,b){return b.createdAt.localeCompare(a.createdAt);});
  document.getElementById('filterCount').textContent = hs.length+'件';
  document.getElementById('grid').innerHTML = hs.length
    ? hs.map(renderCard).join('')
    : '<div class="empty" style="grid-column:1/-1">条件に一致する仮説がありません</div>';
}

['filterCat','filterStatus','sortBy'].forEach(function(id){
  document.getElementById(id).addEventListener('change', render);
});
render();
</script>
</body>
</html>
